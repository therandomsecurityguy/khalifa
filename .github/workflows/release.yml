name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      dry-run:
        description: 'Dry run (skip publishing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      api-service-version: ${{ steps.set-version.outputs.api-service-version }}
      risk-engine-version: ${{ steps.set-version.outputs.risk-engine-version }}
      collector-version: ${{ steps.set-version.outputs.collector-version }}
      ui-version: ${{ steps.set-version.outputs.ui-version }}
      cdk-version: ${{ steps.set-version.outputs.cdk-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            api-service/package-lock.json
            lambdas/risk-engine/package-lock.json
            lambdas/collector/package-lock.json
            lambdas/incremental-collector/package-lock.json
            lambdas/list-accounts/package-lock.json
            lambdas/graph-writer/package-lock.json
            ui/package-lock.json
            cdk/package-lock.json

      - name: Install API service deps
        working-directory: api-service
        run: npm ci

      - name: Install risk-engine deps
        working-directory: lambdas/risk-engine
        run: npm ci

      - name: Install collector deps
        working-directory: lambdas/collector
        run: npm ci

      - name: Install incremental-collector deps
        working-directory: lambdas/incremental-collector
        run: npm ci

      - name: Install list-accounts deps
        working-directory: lambdas/list-accounts
        run: npm ci

      - name: Install graph-writer deps
        working-directory: lambdas/graph-writer
        run: npm ci

      - name: Install UI deps
        working-directory: ui
        run: npm ci

      - name: Install CDK deps
        working-directory: cdk
        run: npm ci

      - name: Set version
        id: set-version
        run: |
          version="${{ github.event.inputs.version }}"
          echo "api-service-version=${version}" >> $GITHUB_OUTPUT
          echo "risk-engine-version=${version}" >> $GITHUB_OUTPUT
          echo "collector-version=${version}" >> $GITHUB_OUTPUT
          echo "ui-version=${version}" >> $GITHUB_OUTPUT
          echo "cdk-version=${version}" >> $GITHUB_OUTPUT

      - name: Build API service
        working-directory: api-service
        run: npm run build

      - name: Build Risk Engine
        working-directory: lambdas/risk-engine
        run: npm run build

      - name: Build Collector
        working-directory: lambdas/collector
        run: npm run build

      - name: Build Incremental Collector
        working-directory: lambdas/incremental-collector
        run: npm run build

      - name: Build List Accounts
        working-directory: lambdas/list-accounts
        run: npm run build

      - name: Build Graph Writer
        working-directory: lambdas/graph-writer
        run: npm run build

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Build CDK
        working-directory: cdk
        run: npm run build

      - name: Synthesize CDK
        working-directory: cdk
        run: npx cdk synth --no-lookups --app "npx ts-node --prefer-ts-exts bin/khalifa.ts"

      - name: Create release artifacts
        run: |
          set -euo pipefail
          version="${{ github.event.inputs.version }}"
          mkdir -p dist

          # API Service
          mkdir -p dist/api-service
          cp -r api-service/dist dist/api-service/
          cp api-service/package.json api-service/package-lock.json dist/api-service/
          tar -C dist -czf "dist/api-service_${version}.tar.gz" api-service

          # Risk Engine Lambda
          mkdir -p dist/lambdas/risk-engine
          cp -r lambdas/risk-engine/dist dist/lambdas/risk-engine/
          cp lambdas/risk-engine/package.json lambdas/risk-engine/package-lock.json dist/lambdas/risk-engine/
          tar -C dist -czf "dist/risk-engine_${version}.tar.gz" lambdas/risk-engine

          # Collector Lambda
          mkdir -p dist/lambdas/collector
          cp -r lambdas/collector/dist dist/lambdas/collector/
          cp lambdas/collector/package.json lambdas/collector/package-lock.json dist/lambdas/collector/
          tar -C dist -czf "dist/collector_${version}.tar.gz" lambdas/collector

          # UI
          mkdir -p dist/ui
          cp -r ui/.next dist/ui/
          cp ui/package.json ui/package-lock.json dist/ui/
          tar -C dist -czf "dist/ui_${version}.tar.gz" ui

          # CDK
          mkdir -p dist/cdk
          cp -r cdk/dist dist/cdk/
          cp cdk/package.json cdk/package-lock.json dist/cdk/
          tar -C dist -czf "dist/cdk_${version}.tar.gz" cdk

          # Templates
          mkdir -p dist/templates
          cp -r templates dist/
          tar -C dist -czf "dist/templates_${version}.tar.gz" templates

          # EKS manifests
          mkdir -p dist/eks-manifests
          cp -r eks-manifests dist/
          tar -C dist -czf "dist/eks-manifests_${version}.tar.gz" eks-manifests

      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum ./*.tar.gz > checksums.txt)

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ github.event.inputs.version }}
          path: dist
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish Release
    needs: build
    if: ${{ !github.event.inputs.dry-run }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: release-${{ github.event.inputs.version }}
          path: dist

      - name: Verify checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum -c checksums.txt)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ github.event.inputs.version }}"
          if gh release view "${version}" >/dev/null 2>&1; then
            echo "Release ${version} already exists, uploading assets..."
            gh release upload "${version}" dist/* --clobber
          else
            echo "Creating release ${version}..."
            gh release create "${version}" dist/* --verify-tag --generate-notes
          fi